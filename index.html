<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budżet">
<meta name="theme-color" content="#000000">
<title>Budżet</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS — iOS Dark Mode (Apple HIG compliant)
   ============================================================ */
:root {
  /* System backgrounds — layered dark surfaces */
  --sys-bg:          #000000;
  --sys-bg2:         #1C1C1E;
  --sys-bg3:         #2C2C2E;
  --sys-bg4:         #3A3A3C;

/* System labels */
–label:           #FFFFFF;
–label-2:         rgba(235,235,245,0.60);
–label-3:         rgba(235,235,245,0.30);
–label-4:         rgba(235,235,245,0.18);

/* Separators */
–sep:             rgba(84,84,88,0.65);
–sep-opaque:      #38383A;

/* iOS system colors */
–blue:   #0A84FF;
–green:  #30D158;
–red:    #FF453A;
–orange: #FF9F0A;
–purple: #BF5AF2;
–teal:   #5AC8FA;

/* Tab bar */
–tabbar-bg: rgba(28,28,30,0.85);
–tabbar-h:  49px;

/* Safe areas (set by JS) */
–sat: 0px;
–sab: 0px;
}

/* ============================================================
RESET
============================================================ */
*, *::before, *::after {
box-sizing: border-box;
margin: 0; padding: 0;
-webkit-tap-highlight-color: transparent;
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: var(–sys-bg);
color: var(–label);
/* SF Pro Text — Apple’s system font */
font-family: -apple-system, ‘SF Pro Text’, ‘Helvetica Neue’, sans-serif;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input  { font-family: inherit; border: none; outline: none; background: none; color: var(–label); }
input::placeholder { color: var(–label-3); }

/* ============================================================
APP SHELL
============================================================ */
#app {
display: flex;
flex-direction: column;
height: 100%;
}

/* Status bar spacer — only meaningful in standalone PWA */
#status-bar {
flex-shrink: 0;
background: var(–sys-bg);
height: var(–sat);
}

/* Scrollable content */
#content {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
background: var(–sys-bg);
/* pad below tab bar */
padding-bottom: calc(var(–tabbar-h) + var(–sab) + 16px);
}
#content::-webkit-scrollbar { display: none; }

/* ============================================================
TAB BAR
============================================================ */
#tabbar {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 100;
height: calc(var(–tabbar-h) + var(–sab));
padding-bottom: var(–sab);
padding-top: 8px;
background: var(–tabbar-bg);
backdrop-filter: blur(20px) saturate(180%);
-webkit-backdrop-filter: blur(20px) saturate(180%);
border-top: 0.33px solid var(–sep);
display: flex;
align-items: flex-start;
}

.tab {
flex: 1;
display: flex; flex-direction: column;
align-items: center; gap: 3px;
color: var(–label-3);
transition: color 0.15s ease;
padding: 0 4px;
}
.tab.active { color: var(–blue); }
.tab svg    { width: 25px; height: 25px; display: block; }
.tab-label  { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }

/* Center add button */
.tab-add { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 0; }
.tab-add-dot {
width: 32px; height: 32px; border-radius: 50%;
background: var(–blue);
display: flex; align-items: center; justify-content: center;
box-shadow: 0 2px 12px rgba(10,132,255,0.45);
transition: transform 0.12s, opacity 0.12s;
}
.tab-add:active .tab-add-dot { transform: scale(0.88); opacity: 0.8; }
.tab-add .tab-label { color: var(–blue); }

/* ============================================================
TYPOGRAPHY SCALE
============================================================ */
.t-large-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
.t-title-1     { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; }
.t-title-2     { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.t-title-3     { font-size: 20px; font-weight: 600; letter-spacing: -0.2px; }
.t-headline    { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.t-body        { font-size: 17px; font-weight: 400; letter-spacing: -0.2px; }
.t-callout     { font-size: 16px; font-weight: 400; letter-spacing: -0.2px; }
.t-subhead     { font-size: 15px; font-weight: 400; letter-spacing: -0.1px; }
.t-footnote    { font-size: 13px; font-weight: 400; letter-spacing: -0.1px; color: var(–label-2); }
.t-caption     { font-size: 12px; font-weight: 400; letter-spacing: 0; color: var(–label-3); }
.t-overline    { font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(–label-3); }

/* ============================================================
HERO CARD — gradient, like Apple Wallet
============================================================ */
.hero-card {
margin: 8px 16px 0;
border-radius: 22px;
padding: 24px 22px 22px;
overflow: hidden;
position: relative;
/* default: blue */
background: linear-gradient(150deg, #003FA3 0%, #0A84FF 55%, #40B0FF 100%);
box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.hero-card.danger { background: linear-gradient(150deg, #7A0000 0%, #FF453A 55%, #FF7B73 100%); }
.hero-card.success { background: linear-gradient(150deg, #004D1A 0%, #30D158 55%, #6EE89A 100%); }

/* Decorative circles */
.hero-card::before,
.hero-card::after {
content: ‘’;
position: absolute;
border-radius: 50%;
pointer-events: none;
}
.hero-card::before {
width: 200px; height: 200px;
top: -60px; right: -50px;
background: rgba(255,255,255,0.08);
}
.hero-card::after {
width: 140px; height: 140px;
bottom: -50px; left: 10px;
background: rgba(255,255,255,0.05);
}

.hero-eyebrow {
font-size: 12px; font-weight: 600;
letter-spacing: 0.06em; text-transform: uppercase;
opacity: 0.7; margin-bottom: 6px;
}
.hero-amount {
font-size: 50px; font-weight: 700;
letter-spacing: -2.5px; line-height: 1;
margin-bottom: 20px;
}

/* Two-stat bar at bottom of hero */
.hero-stats {
display: flex;
border-radius: 14px;
background: rgba(0,0,0,0.20);
overflow: hidden;
}
.hero-stat {
flex: 1; padding: 11px 14px;
}
.hero-stat + .hero-stat {
border-left: 0.5px solid rgba(255,255,255,0.2);
}
.hero-stat-label {
font-size: 11px; font-weight: 500;
opacity: 0.65; letter-spacing: 0.04em;
text-transform: uppercase; margin-bottom: 2px;
}
.hero-stat-value {
font-size: 19px; font-weight: 600; letter-spacing: -0.5px;
}

/* Progress line */
.hero-progress {
height: 3px; border-radius: 99px;
background: rgba(255,255,255,0.25);
margin-top: 14px; overflow: hidden;
}
.hero-progress-fill {
height: 100%; border-radius: 99px;
background: rgba(255,255,255,0.85);
transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
}

/* ============================================================
HORIZONTAL STAT CHIPS
============================================================ */
.chip-row {
display: flex; gap: 10px;
overflow-x: auto;
padding: 16px 16px 0;
-webkit-overflow-scrolling: touch;
}
.chip-row::-webkit-scrollbar { display: none; }

.chip {
flex-shrink: 0;
background: var(–sys-bg2);
border-radius: 16px;
padding: 14px 16px;
min-width: 130px;
}
.chip-label { font-size: 11px; font-weight: 500; color: var(–label-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.chip-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.chip-sub   { font-size: 12px; color: var(–label-3); margin-top: 3px; }

/* ============================================================
GROUPED LIST (iOS Settings style)
============================================================ */
.group {
margin: 20px 16px 0;
}
.group-title {
font-size: 13px; font-weight: 400;
color: var(–label-2);
padding: 0 4px 8px;
letter-spacing: -0.1px;
}
.group-card {
background: var(–sys-bg2);
border-radius: 12px;
overflow: hidden;
}

.list-row {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 16px;
min-height: 48px;
border-bottom: 0.33px solid rgba(84,84,88,0.35);
transition: background 0.1s;
}
.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(–sys-bg3); }

.row-icon-wrap {
width: 32px; height: 32px;
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 17px; flex-shrink: 0;
}
.row-content { flex: 1; min-width: 0; }
.row-title {
font-size: 16px; font-weight: 500; letter-spacing: -0.2px;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row-subtitle { font-size: 13px; color: var(–label-3); margin-top: 1px; }
.row-trailing { flex-shrink: 0; text-align: right; }
.row-value { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; font-variant-numeric: tabular-nums; }
.row-value.negative { color: var(–red); }
.row-value.positive { color: var(–green); }

/* ============================================================
SECTION HEADER
============================================================ */
.section-hdr {
display: flex; align-items: center; justify-content: space-between;
padding: 20px 16px 10px;
}
.section-hdr-title { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
.section-hdr-action { font-size: 16px; color: var(–blue); font-weight: 400; }

/* ============================================================
INSIGHT ROWS
============================================================ */
.insight-row {
display: flex; align-items: flex-start; gap: 12px;
padding: 14px 16px;
border-bottom: 0.33px solid rgba(84,84,88,0.35);
}
.insight-row:last-child { border-bottom: none; }

.insight-icon-wrap {
width: 36px; height: 36px; border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 18px; flex-shrink: 0; margin-top: 1px;
}
.insight-body { flex: 1; }
.insight-title  { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 3px; }
.insight-detail { font-size: 13px; color: var(–label-2); line-height: 1.45; letter-spacing: -0.1px; }

/* ============================================================
PILL / TAG BUTTON
============================================================ */
.pill {
display: inline-flex; align-items: center; gap: 4px;
padding: 6px 13px; border-radius: 99px;
font-size: 14px; font-weight: 500; letter-spacing: -0.1px;
transition: opacity 0.15s;
}
.pill:active { opacity: 0.65; }
.pill-blue   { background: rgba(10,132,255,0.18); color: var(–blue); }
.pill-green  { background: rgba(48,209,88,0.15); color: var(–green); }
.pill-red    { background: rgba(255,69,58,0.15);  color: var(–red); }
.pill-gray   { background: var(–sys-bg3);         color: var(–label-2); }

/* ============================================================
MONTH NAVIGATOR
============================================================ */
.month-nav { display: flex; align-items: center; gap: 6px; }
.month-btn {
width: 28px; height: 28px; border-radius: 50%;
background: var(–sys-bg3);
color: var(–blue); font-size: 17px;
display: flex; align-items: center; justify-content: center;
transition: opacity 0.15s;
}
.month-btn:active   { opacity: 0.6; }
.month-btn:disabled { opacity: 0.25; pointer-events: none; }
.month-label { font-size: 15px; font-weight: 600; color: var(–label); min-width: 100px; text-align: center; letter-spacing: -0.2px; }

/* ============================================================
PROGRESS BAR (mini)
============================================================ */
.mini-bar { height: 4px; border-radius: 99px; background: var(–sys-bg4); overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

/* ============================================================
ADD EXPENSE BOTTOM SHEET
============================================================ */
#add-sheet { position: fixed; inset: 0; z-index: 500; pointer-events: none; }
#add-sheet.open { pointer-events: all; }

#sheet-backdrop {
position: absolute; inset: 0;
background: rgba(0,0,0,0.72);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
opacity: 0;
transition: opacity 0.3s ease;
}
#add-sheet.open #sheet-backdrop { opacity: 1; }

#sheet-panel {
position: absolute; bottom: 0; left: 0; right: 0;
background: var(–sys-bg2);
border-radius: 20px 20px 0 0;
padding-bottom: calc(var(–sab) + 8px);
transform: translateY(100%);
transition: transform 0.44s cubic-bezier(0.32,1,0.32,1);
max-height: 94vh;
overflow-y: auto;
}
#add-sheet.open #sheet-panel { transform: translateY(0); }

.sheet-grab {
width: 36px; height: 5px; border-radius: 99px;
background: var(–label-4);
margin: 12px auto;
}
.sheet-heading {
font-size: 17px; font-weight: 600;
text-align: center; padding: 0 16px 6px;
letter-spacing: -0.2px;
}

/* Amount display */
.sheet-amount-display {
text-align: center; padding: 6px 20px 16px;
}
.amount-large {
font-size: 54px; font-weight: 300;
letter-spacing: -3px; line-height: 1;
}
.amount-large .amount-currency {
font-size: 30px; font-weight: 300;
color: var(–label-3);
}

/* Note field */
.sheet-note-row {
display: flex; gap: 10px; align-items: center;
padding: 0 16px 14px;
}
.note-input-field {
flex: 1;
background: var(–sys-bg3);
border-radius: 12px;
padding: 12px 14px;
font-size: 15px; color: var(–label);
letter-spacing: -0.2px;
}
.camera-btn {
width: 44px; height: 44px;
border-radius: 12px;
background: var(–sys-bg3);
display: flex; align-items: center; justify-content: center;
font-size: 20px; flex-shrink: 0;
}

/* Category scroller */
.cat-scroller {
display: flex; gap: 8px;
overflow-x: auto; padding: 0 16px 14px;
-webkit-overflow-scrolling: touch;
}
.cat-scroller::-webkit-scrollbar { display: none; }

.cat-chip {
display: flex; flex-direction: column;
align-items: center; gap: 5px;
padding: 12px 14px;
border-radius: 14px;
background: var(–sys-bg3);
border: 1.5px solid transparent;
flex-shrink: 0; min-width: 72px;
transition: background 0.12s, border-color 0.12s;
}
.cat-chip.selected {
background: rgba(10,132,255,0.16);
border-color: var(–blue);
}
.cat-chip-icon { font-size: 24px; }
.cat-chip-label { font-size: 11px; font-weight: 500; color: var(–label-2); white-space: nowrap; }
.cat-chip.selected .cat-chip-label { color: var(–blue); }

/* Numpad */
#numpad {
display: grid;
grid-template-columns: repeat(3,1fr);
gap: 1px;
background: var(–sep);
border-top: 0.33px solid var(–sep);
}
.num-btn {
height: 64px;
background: var(–sys-bg3);
color: var(–label);
font-size: 26px; font-weight: 300;
display: flex; align-items: center; justify-content: center;
border: none;
transition: background 0.08s;
}
.num-btn:active { background: var(–sys-bg4); }
.num-btn.del { font-size: 19px; color: var(–label-2); }
.num-btn.confirm {
grid-column: span 3;
height: 56px;
background: var(–blue);
color: #fff;
font-size: 17px; font-weight: 600;
letter-spacing: -0.2px;
}
.num-btn.confirm:active { background: #0070E0; }

/* ============================================================
CAMERA / SCAN OVERLAY
============================================================ */
#scan-overlay {
position: fixed; inset: 0; z-index: 600;
background: #000;
display: none; flex-direction: column;
}
#scan-overlay.open { display: flex; }

#scan-video { flex: 1; width: 100%; object-fit: cover; }

.scan-ui-layer {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
pointer-events: none;
}
.scan-frame {
width: 280px; height: 180px; border-radius: 16px;
border: 2px solid #fff;
box-shadow: 0 0 0 9999px rgba(0,0,0,0.52);
position: relative; overflow: hidden;
}
.scan-laser {
position: absolute; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(–blue), transparent);
animation: laser 2s ease-in-out infinite;
}
@keyframes laser {
0%   { top: 6px; opacity: 0; }
15%  { opacity: 1; }
85%  { opacity: 1; }
100% { top: calc(100% - 6px); opacity: 0; }
}
.scan-hint-text {
color: rgba(255,255,255,0.75);
font-size: 14px; font-weight: 500;
margin-top: 20px;
letter-spacing: -0.1px;
}

.scan-bottom {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 24px 20px;
padding-bottom: calc(24px + var(–sab));
display: flex; gap: 12px;
background: linear-gradient(transparent, rgba(0,0,0,0.7));
}
.scan-action {
flex: 1; padding: 16px;
border-radius: 16px;
font-size: 16px; font-weight: 600;
font-family: inherit; border: none; cursor: pointer;
}
.scan-action.cancel  { background: rgba(255,255,255,0.15); color: #fff; }
.scan-action.capture { background: #fff; color: var(–blue); flex: 2; }
#scan-canvas { display: none; }

/* ============================================================
CHART CONTAINER
============================================================ */
.chart-container { position: relative; height: 188px; }

/* ============================================================
GOAL RING CARD
============================================================ */
.goal-card {
background: var(–sys-bg2);
border-radius: 18px;
padding: 18px;
margin: 0 16px 10px;
}
.goal-layout { display: flex; align-items: center; gap: 16px; }
.ring-container { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
.ring-svg { transform: rotate(-90deg); }
.ring-track { fill: none; }
.ring-arc   { fill: none; stroke-linecap: round; transition: stroke-dasharray 0.8s cubic-bezier(0.4,0,0.2,1); }
.ring-center-label {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 0;
}
.ring-pct-text  { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
.ring-icon-text { font-size: 13px; }

.goal-info { flex: 1; min-width: 0; }
.goal-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
.goal-progress-text { font-size: 14px; color: var(–label-3); margin-bottom: 12px; }
.goal-btns { display: flex; gap: 8px; }

.goal-footer {
margin-top: 14px;
padding-top: 14px;
border-top: 0.33px solid var(–sep-opaque);
display: flex; justify-content: space-between;
}
.goal-footer-item { }
.gfi-label { font-size: 11px; color: var(–label-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.gfi-value { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }

/* ============================================================
CHAT
============================================================ */
#chat-layout {
display: flex; flex-direction: column;
background: var(–sys-bg);
}
#chat-messages {
flex: 1; overflow-y: auto; padding: 10px 16px;
-webkit-overflow-scrolling: touch;
}
#chat-messages::-webkit-scrollbar { display: none; }

.chat-msg { display: flex; margin-bottom: 10px; }
.chat-msg.user { justify-content: flex-end; }

.chat-bubble {
max-width: 78%;
padding: 11px 15px;
border-radius: 20px;
font-size: 16px; line-height: 1.45;
letter-spacing: -0.2px;
}
.chat-msg.ai   .chat-bubble { background: var(–sys-bg2); color: var(–label); border-bottom-left-radius: 5px; }
.chat-msg.user .chat-bubble { background: var(–blue); color: #fff; border-bottom-right-radius: 5px; }

.typing-dot {
display: inline-block; width: 7px; height: 7px;
border-radius: 50%; background: var(–label-3);
margin: 0 2px;
animation: tdot 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

.chat-suggestion-row {
display: flex; gap: 8px;
overflow-x: auto; padding: 8px 16px 6px;
flex-shrink: 0;
}
.chat-suggestion-row::-webkit-scrollbar { display: none; }

.chat-suggestion {
white-space: nowrap;
padding: 8px 14px; border-radius: 99px;
background: var(–sys-bg2);
border: 0.5px solid var(–sep);
color: var(–blue); font-size: 14px; font-weight: 500;
flex-shrink: 0; font-family: inherit;
transition: opacity 0.15s;
}
.chat-suggestion:active { opacity: 0.6; }

#chat-input-bar {
flex-shrink: 0;
display: flex; align-items: center; gap: 10px;
padding: 10px 16px;
background: var(–tabbar-bg);
backdrop-filter: blur(20px) saturate(180%);
-webkit-backdrop-filter: blur(20px) saturate(180%);
border-top: 0.33px solid var(–sep);
}
#chat-input-field {
flex: 1;
background: var(–sys-bg3);
border-radius: 20px;
padding: 10px 16px;
font-size: 16px; color: var(–label);
letter-spacing: -0.2px;
}
.chat-send-btn {
width: 36px; height: 36px; border-radius: 50%;
background: var(–blue);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; color: #fff;
transition: opacity 0.15s;
}
.chat-send-btn:active { opacity: 0.7; }

/* ============================================================
TOAST
============================================================ */
#toast {
position: fixed;
top: calc(var(–sat) + 14px); left: 50%;
transform: translateX(-50%) translateY(-90px);
background: rgba(44,44,46,0.96);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border: 0.33px solid var(–sep);
color: var(–label);
border-radius: 24px;
padding: 11px 20px;
font-size: 15px; font-weight: 500;
z-index: 900; white-space: nowrap;
transition: transform 0.38s cubic-bezier(0.32,1,0.32,1);
letter-spacing: -0.2px;
box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
#toast.visible { transform: translateX(-50%) translateY(0); }

/* ============================================================
PAGE TRANSITIONS
============================================================ */
@keyframes pageIn {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}
.page-in { animation: pageIn 0.28s ease forwards; }

/* ============================================================
EMPTY STATE
============================================================ */
.empty-state {
display: flex; flex-direction: column;
align-items: center; text-align: center;
padding: 60px 32px;
gap: 10px;
}
.empty-emoji { font-size: 52px; }
.empty-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-top: 4px; }
.empty-body  { font-size: 15px; color: var(–label-2); line-height: 1.5; max-width: 250px; }

/* ============================================================
TIPS LIST
============================================================ */
.tip-item {
display: flex; gap: 14px; align-items: flex-start;
padding: 14px 16px;
border-bottom: 0.33px solid rgba(84,84,88,0.35);
}
.tip-item:last-child { border-bottom: none; }
.tip-icon-wrap {
width: 34px; height: 34px; border-radius: 9px;
display: flex; align-items: center; justify-content: center;
font-size: 17px; flex-shrink: 0;
}
.tip-title  { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 2px; }
.tip-detail { font-size: 13px; color: var(–label-2); line-height: 1.4; letter-spacing: -0.1px; }
</style>

<script>
'use strict';

/* ── CATEGORIES ─────────────────────────────────────────── */
const CATS = [
  { id:'food',      emoji:'🍽️', label:'Jedzenie',    color:'#FF6B35', tint:'rgba(255,107,53,0.22)' },
  { id:'cafe',      emoji:'☕',  label:'Kawiarnia',   color:'#C67C2E', tint:'rgba(198,124,46,0.22)' },
  { id:'transport', emoji:'🚗',  label:'Transport',   color:'#0A84FF', tint:'rgba(10,132,255,0.22)' },
  { id:'fun',       emoji:'🎮',  label:'Rozrywka',    color:'#BF5AF2', tint:'rgba(191,90,242,0.22)' },
  { id:'shopping',  emoji:'🛍️', label:'Zakupy',      color:'#FF375F', tint:'rgba(255,55,95,0.22)'  },
  { id:'housing',   emoji:'🏠',  label:'Mieszkanie',  color:'#30D158', tint:'rgba(48,209,88,0.22)'  },
  { id:'health',    emoji:'💊',  label:'Zdrowie',     color:'#FF9F0A', tint:'rgba(255,159,10,0.22)' },
  { id:'sub',       emoji:'📱',  label:'Subskrypcje', color:'#5AC8FA', tint:'rgba(90,200,250,0.22)' },
  { id:'sport',     emoji:'💪',  label:'Sport',       color:'#30D158', tint:'rgba(48,209,88,0.22)'  },
  { id:'travel',    emoji:'✈️',  label:'Podróże',     color:'#FF9F0A', tint:'rgba(255,159,10,0.22)' },
  { id:'invest',    emoji:'💰',  label:'Oszczędności',color:'#FFD60A', tint:'rgba(255,214,10,0.22)' },
  { id:'other',     emoji:'📦',  label:'Inne',        color:'#98989D', tint:'rgba(152,152,157,0.22)'},
];

/* ── STORAGE ─────────────────────────────────────────────── */
const get = (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const set = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

let DB = {
  expenses: get('bdg_exp', []),
  income:   get('bdg_inc', 0),
  goals:    get('bdg_goals', []),
  chat:     get('bdg_chat', []),
  month:    new Date().toISOString().slice(0,7),
};

function persist() {
  set('bdg_exp',   DB.expenses);
  set('bdg_inc',   DB.income);
  set('bdg_goals', DB.goals);
  set('bdg_chat',  DB.chat.slice(-50));
}

/* ── HELPERS ─────────────────────────────────────────────── */
const monthKey  = (d = new Date()) => d.toISOString().slice(0, 7);
const monthExps = (m) => DB.expenses.filter(e => e.month === (m || monthKey()));
const catById   = (id) => CATS.find(c => c.id === id) || CATS[CATS.length - 1];

const currency = (n) => new Intl.NumberFormat('pl-PL', {
  style: 'currency', currency: 'PLN',
  maximumFractionDigits: n % 1 === 0 ? 0 : 2
}).format(n);

/* ── ROUTER ──────────────────────────────────────────────── */
let currentTab = 'home';
let activeCharts = {};

function goTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('t-' + tab);
  if (btn) btn.classList.add('active');
  renderPage();
  document.getElementById('content').scrollTop = 0;
}

function renderPage() {
  Object.values(activeCharts).forEach(c => { try { c.destroy(); } catch {} });
  activeCharts = {};

  const el = document.getElementById('content');
  el.style.paddingBottom = '';

  if (currentTab === 'home')  el.innerHTML = buildHome();
  if (currentTab === 'stats') el.innerHTML = buildStats();
  if (currentTab === 'goals') el.innerHTML = buildGoals();
  if (currentTab === 'ai')    el.innerHTML = buildAI();

  if (currentTab === 'stats') setTimeout(mountCharts, 60);
  if (currentTab === 'ai')    setTimeout(initChatLayout, 40);
}

/* ════════════════════════════════════════════════════════════
   HOME
   ════════════════════════════════════════════════════════════ */
function buildHome() {
  const m     = DB.month;
  const exps  = monthExps(m);
  const total = exps.reduce((s, e) => s + e.amount, 0);
  const saved = DB.income > 0 ? DB.income - total : null;
  const pct   = DB.income > 0 ? Math.min(total / DB.income, 1) : 0;
  const isCur = m === monthKey();
  const vDate = new Date(m + '-01');
  const mName = vDate.toLocaleDateString('pl-PL', { month: 'long', year: 'numeric' });

  // Hero color
  const heroClass = (saved !== null && saved < 0) ? 'danger' : '';

  // Recent 5
  const recent = [...exps].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

  // Insights
  const insights = buildInsights(exps, total);

  return `<div class="page-in">

    <!-- Top bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;">
      <div class="month-nav">
        <button class="month-btn" onclick="shiftMonth(-1)">‹</button>
        <span class="month-label">${mName}</span>
        <button class="month-btn" onclick="shiftMonth(1)" ${isCur ? 'disabled' : ''}>›</button>
      </div>
      <button onclick="promptIncome()" class="pill pill-gray" style="font-size:13px;">
        ${DB.income > 0 ? '💳 ' + currency(DB.income) : '+ Ustaw dochód'}
      </button>
    </div>

    <!-- Hero -->
    <div class="hero-card ${heroClass}">
      <div class="hero-eyebrow">Wydano w tym miesiącu</div>
      <div class="hero-amount">${currency(total)}</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-label">Oszczędności</div>
          <div class="hero-stat-value">${saved !== null ? currency(saved) : '—'}</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Dziennie śred.</div>
          <div class="hero-stat-value">${currency(total / Math.max(new Date().getDate(), 1))}</div>
        </div>
      </div>
      ${DB.income > 0 ? `<div class="hero-progress"><div class="hero-progress-fill" style="width:${(pct*100).toFixed(1)}%"></div></div>` : ''}
    </div>

    <!-- Chips -->
    <div class="chip-row">
      ${chip('Budżet',       DB.income > 0 ? currency(DB.income) : '—', 'miesięcznie')}
      ${chip('Transakcje',   exps.length, 'ten miesiąc')}
      ${chip('Stopa oszcz.', DB.income > 0 ? Math.max(0, ((saved / DB.income) * 100)).toFixed(0) + '%' : '—', 'z dochodu')}
      ${chip('Prognoza',     currency(total / Math.max(new Date().getDate(), 1) * 30), 'do końca mies.')}
    </div>

    <!-- Insights -->
    ${insights.length ? `
    <div class="section-hdr" style="padding-top:18px;">
      <span class="section-hdr-title">Spostrzeżenia</span>
    </div>
    <div style="margin:0 16px;">
      <div class="group-card">
        ${insights.map(ins => `
        <div class="insight-row">
          <div class="insight-icon-wrap" style="background:${ins.tint};">${ins.icon}</div>
          <div class="insight-body">
            <div class="insight-title">${ins.title}</div>
            <div class="insight-detail">${ins.detail}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Recent -->
    <div class="section-hdr">
      <span class="section-hdr-title">Ostatnie</span>
      ${exps.length > 5 ? `<button onclick="goTab('stats')" class="section-hdr-action">Wszystkie (${exps.length})</button>` : ''}
    </div>

    ${recent.length === 0 ? `
    <div class="empty-state">
      <div class="empty-emoji">🌱</div>
      <div class="empty-title">Brak wydatków</div>
      <div class="empty-body">Dotknij + żeby dodać pierwszy wydatek tego miesiąca</div>
    </div>` : `
    <div style="margin:0 16px 8px;">
      <div class="group-card">
        ${recent.map(expRow).join('')}
      </div>
    </div>`}

  </div>`;
}

function chip(label, value, sub) {
  return `<div class="chip">
    <div class="chip-label">${label}</div>
    <div class="chip-value">${value}</div>
    <div class="chip-sub">${sub}</div>
  </div>`;
}

function expRow(e) {
  const c = catById(e.category);
  const d = new Date(e.date);
  const dateStr = d.toLocaleDateString('pl-PL', { day: '2-digit', month: 'short' });
  const timeStr = d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
  return `<div class="list-row" onclick="confirmDelete('${e.id}','${(e.note || c.label).replace(/'/g,'')}',${e.amount})">
    <div class="row-icon-wrap" style="background:${c.tint};">${c.emoji}</div>
    <div class="row-content">
      <div class="row-title">${e.note || c.label}</div>
      <div class="row-subtitle">${c.label} · ${dateStr} ${timeStr}</div>
    </div>
    <div class="row-trailing">
      <div class="row-value negative">-${currency(e.amount)}</div>
    </div>
  </div>`;
}

function buildInsights(exps, total) {
  if (total === 0) return [];
  const result = [];
  const bycat = {};
  exps.forEach(e => { bycat[e.category] = (bycat[e.category] || 0) + e.amount; });

  const top = Object.entries(bycat).sort((a, b) => b[1] - a[1])[0];
  if (top) {
    const c = catById(top[0]);
    result.push({ icon: c.emoji, tint: c.tint, title: `Najwięcej: ${c.label}`, detail: `${currency(top[1])} — ${((top[1]/total)*100).toFixed(0)}% wszystkich wydatków w tym miesiącu` });
  }

  const impulse = ['fun','shopping','cafe'].reduce((s, id) => s + (bycat[id] || 0), 0);
  if (impulse > 0)
    result.push({ icon: '⚡', tint: 'rgba(255,159,10,0.22)', title: 'Wydatki impulsywne', detail: `Rozrywka + zakupy + kawiarnie: ${currency(impulse)} (${((impulse/total)*100).toFixed(0)}% budżetu)` });

  if (DB.income > 0) {
    const sv = DB.income - total;
    result.push({ icon: sv >= 0 ? '✅' : '🚨', tint: sv >= 0 ? 'rgba(48,209,88,0.22)' : 'rgba(255,69,58,0.22)', title: sv >= 0 ? 'Oszczędzasz' : 'Przekroczony budżet', detail: sv >= 0 ? `Zostało ${currency(sv)} — stopa ${((sv/DB.income)*100).toFixed(0)}%` : `Wydałeś o ${currency(-sv)} za dużo` });
  }

  return result.slice(0, 3);
}

function shiftMonth(dir) {
  const d = new Date(DB.month + '-01');
  d.setMonth(d.getMonth() + dir);
  const nm = d.toISOString().slice(0, 7);
  if (nm > monthKey()) return;
  DB.month = nm;
  renderPage();
}

function promptIncome() {
  const v = prompt('Miesięczny dochód netto (PLN):', DB.income || '');
  if (v === null) return;
  const n = parseFloat(v.replace(',', '.'));
  if (!isNaN(n) && n >= 0) { DB.income = n; persist(); renderPage(); }
}

function confirmDelete(id, label, amount) {
  if (!confirm(`Usunąć "${label}" (${currency(amount)})?`)) return;
  DB.expenses = DB.expenses.filter(e => e.id !== id);
  persist(); renderPage(); showToast('Usunięto');
}

/* ════════════════════════════════════════════════════════════
   STATS
   ════════════════════════════════════════════════════════════ */
function buildStats() {
  const m    = DB.month;
  const exps = monthExps(m);
  const total= exps.reduce((s, e) => s + e.amount, 0);

  const bycat = {};
  exps.forEach(e => { bycat[e.category] = (bycat[e.category] || 0) + e.amount; });
  const catRows = Object.entries(bycat)
    .sort((a, b) => b[1] - a[1])
    .map(([id, amt]) => ({ ...catById(id), amount: amt, pct: total > 0 ? +(amt / total * 100).toFixed(1) : 0 }));

  const m6 = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    const mk = d.toISOString().slice(0, 7);
    m6.push({ label: d.toLocaleDateString('pl-PL', { month: 'short' }), spent: monthExps(mk).reduce((s,e) => s+e.amount, 0) });
  }

  const isCur = m === monthKey();
  const vDate = new Date(m + '-01');

  return `<div class="page-in">

    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;">
      <div class="t-large-title">Analiza</div>
      <div class="month-nav">
        <button class="month-btn" onclick="shiftMonth(-1)">‹</button>
        <span style="font-size:14px;font-weight:500;color:var(--label-2);min-width:78px;text-align:center;">
          ${vDate.toLocaleDateString('pl-PL', { month: 'long' })}
        </span>
        <button class="month-btn" onclick="shiftMonth(1)" ${isCur ? 'disabled' : ''}>›</button>
      </div>
    </div>

    <!-- Trend -->
    <div style="margin:0 16px 10px;">
      <div class="group-card" style="padding:18px;">
        <div class="t-overline" style="margin-bottom:14px;">Trend 6 miesięcy</div>
        <div class="chart-container"><canvas id="trend-chart"></canvas></div>
        <div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:0.33px solid var(--sep-opaque);">
          <div>
            <div style="font-size:11px;font-weight:500;color:var(--label-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Najwyższy</div>
            <div style="font-size:18px;font-weight:700;color:var(--red);">${currency(Math.max(...m6.map(x=>x.spent)))}</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:11px;font-weight:500;color:var(--label-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Średnia</div>
            <div style="font-size:18px;font-weight:700;">${currency(m6.reduce((s,x)=>s+x.spent,0)/6)}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;font-weight:500;color:var(--label-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Ten miesiąc</div>
            <div style="font-size:18px;font-weight:700;color:var(--blue);">${currency(total)}</div>
          </div>
        </div>
      </div>
    </div>

    ${catRows.length > 0 ? `
    <!-- Donut + breakdown -->
    <div style="margin:0 16px 10px;">
      <div class="group-card" style="padding:18px;">
        <div class="t-overline" style="margin-bottom:14px;">Rozkład kategorii</div>
        <div style="display:flex;align-items:center;gap:18px;">
          <div style="position:relative;width:120px;height:120px;flex-shrink:0;">
            <canvas id="donut-chart"></canvas>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
              <div style="font-size:16px;font-weight:700;letter-spacing:-0.5px;">${currency(total)}</div>
              <div style="font-size:11px;color:var(--label-3);text-transform:uppercase;letter-spacing:0.04em;">total</div>
            </div>
          </div>
          <div style="flex:1;">
            ${catRows.slice(0, 5).map(r => `
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;">
              <span style="font-size:16px;width:22px;text-align:center;">${r.emoji}</span>
              <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                  <span style="font-size:13px;font-weight:600;">${r.label}</span>
                  <span style="font-size:12px;color:var(--label-3);">${r.pct}%</span>
                </div>
                <div class="mini-bar"><div class="mini-bar-fill" style="width:${r.pct}%;background:${r.color};"></div></div>
              </div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- Category rows -->
    <div style="padding:4px 16px 8px;"><div class="t-overline">Kategorie</div></div>
    <div style="margin:0 16px 10px;">
      <div class="group-card">
        ${catRows.map(r => `
        <div class="list-row">
          <div class="row-icon-wrap" style="background:${r.tint};">${r.emoji}</div>
          <div class="row-content">
            <div class="row-title">${r.label}</div>
            <div class="row-subtitle">${r.pct}% wydatków</div>
          </div>
          <div class="row-trailing">
            <div class="row-value">${currency(r.amount)}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>

    <!-- All transactions -->
    <div style="padding:4px 16px 8px;"><div class="t-overline">Transakcje (${exps.length})</div></div>
    <div style="margin:0 16px 8px;">
      <div class="group-card">
        ${[...exps].sort((a,b) => new Date(b.date)-new Date(a.date)).map(expRow).join('')}
      </div>
    </div>

    ` : `<div class="empty-state">
      <div class="empty-emoji">📭</div>
      <div class="empty-title">Brak danych</div>
      <div class="empty-body">Brak wydatków za wybrany miesiąc</div>
    </div>`}

  </div>`;
}

function mountCharts() {
  const m6 = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth() - i);
    m6.push({ label: d.toLocaleDateString('pl-PL', { month: 'short' }), spent: monthExps(d.toISOString().slice(0,7)).reduce((s,e) => s+e.amount, 0) });
  }

  const tc = document.getElementById('trend-chart');
  if (tc) activeCharts.trend = new Chart(tc, {
    type: 'bar',
    data: {
      labels: m6.map(x => x.label),
      datasets: [{
        data: m6.map(x => x.spent),
        backgroundColor: m6.map((_, i) => i === 5 ? 'rgba(10,132,255,0.85)' : 'rgba(255,255,255,0.09)'),
        borderRadius: 8, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ' ' + currency(ctx.raw) },
          backgroundColor: '#2C2C2E',
          titleColor: 'rgba(235,235,245,0.6)',
          bodyColor: '#fff',
          borderColor: 'rgba(84,84,88,0.65)',
          borderWidth: 0.5,
          borderRadius: 12,
          padding: 12,
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: 'rgba(235,235,245,0.30)', font: { family: '-apple-system', size: 11 }, maxRotation: 0 }, border: { display: false } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(235,235,245,0.30)', font: { family: '-apple-system', size: 11 }, callback: v => v > 0 ? (v/1000).toFixed(0)+'k' : '0' }, border: { display: false } },
      }
    }
  });

  const dc = document.getElementById('donut-chart');
  if (dc) {
    const exps = monthExps(DB.month);
    const bycat = {};
    exps.forEach(e => { bycat[e.category] = (bycat[e.category] || 0) + e.amount; });
    const rows = Object.entries(bycat).sort((a,b) => b[1]-a[1]).slice(0,7);
    activeCharts.donut = new Chart(dc, {
      type: 'doughnut',
      data: {
        labels: rows.map(([id]) => catById(id).label),
        datasets: [{ data: rows.map(([,a]) => a), backgroundColor: rows.map(([id]) => catById(id).color), borderWidth: 0, hoverOffset: 5 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => ' ' + currency(ctx.raw) },
            backgroundColor: '#2C2C2E', bodyColor: '#fff', borderRadius: 12, padding: 12,
          }
        }
      }
    });
  }
}

/* ════════════════════════════════════════════════════════════
   GOALS
   ════════════════════════════════════════════════════════════ */
function buildGoals() {
  const exps    = monthExps(monthKey());
  const total   = exps.reduce((s, e) => s + e.amount, 0);
  const mSaved  = Math.max((DB.income || 0) - total, 0);

  const tips = [
    { icon: '💡', tint: 'rgba(255,214,10,0.22)', title: 'Zasada 50/30/20',        detail: '50% potrzeby · 30% przyjemności · 20% oszczędności' },
    { icon: '🤖', tint: 'rgba(10,132,255,0.22)',  title: 'Automatyczny przelew',   detail: 'Przelej oszczędności tuż po wypłacie — zanim zdążysz wydać' },
    { icon: '⏱',  tint: 'rgba(255,159,10,0.22)', title: 'Reguła 24h',             detail: 'Czekaj dobę przed nieplanowanym zakupem > 200 zł' },
    { icon: '📊', tint: 'rgba(48,209,88,0.22)',   title: 'Zapisuj każdy wydatek',  detail: 'Sam fakt śledzenia zmniejsza wydatki o ok. 15–20%' },
  ];

  return `<div class="page-in">

    <div style="display:flex;align-items:flex-end;justify-content:space-between;padding:14px 16px 10px;">
      <div class="t-large-title">Cele</div>
      <button onclick="createGoal()" class="pill pill-blue">+ Nowy cel</button>
    </div>

    <!-- Savings hero -->
    <div class="hero-card success" style="margin-bottom:16px;">
      <div class="hero-eyebrow">Oszczędności — ten miesiąc</div>
      <div class="hero-amount">${currency(mSaved)}</div>
      ${DB.income > 0 ? `
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-label">Stopa oszczędności</div>
          <div class="hero-stat-value">${((mSaved/DB.income)*100).toFixed(0)}%</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">Cel wg zasady 20%</div>
          <div class="hero-stat-value">${currency(DB.income * 0.2)}</div>
        </div>
      </div>` : ''}
    </div>

    ${DB.goals.length === 0 ? `
    <div class="empty-state">
      <div class="empty-emoji">🎯</div>
      <div class="empty-title">Brak celów</div>
      <div class="empty-body">Dodaj cel — wakacje, laptop, poduszka finansowa. Zobaczysz za ile miesięcy go osiągniesz.</div>
      <button onclick="createGoal()" style="margin-top:18px;padding:14px 30px;border-radius:99px;background:var(--blue);color:#fff;font-size:16px;font-weight:600;font-family:inherit;border:none;">Dodaj cel</button>
    </div>` : DB.goals.map((g, i) => {
      const pct   = Math.min((g.saved / g.target) * 100, 100);
      const R     = 37, circ = 2 * Math.PI * R, dash = (pct / 100) * circ;
      const rem   = Math.max(g.target - g.saved, 0);
      const mLeft = mSaved > 0 ? Math.ceil(rem / mSaved) : '?';
      const arcColor = pct >= 100 ? 'var(--green)' : pct > 55 ? 'var(--blue)' : 'var(--orange)';
      return `
      <div class="goal-card">
        <div class="goal-layout">
          <div class="ring-container">
            <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
              <circle class="ring-track" cx="45" cy="45" r="${R}" stroke="var(--sys-bg4)" stroke-width="7"/>
              <circle class="ring-arc"   cx="45" cy="45" r="${R}" stroke="${arcColor}" stroke-width="7" stroke-dasharray="${dash} ${circ}"/>
            </svg>
            <div class="ring-center-label">
              <div class="ring-icon-text">${g.icon || '🎯'}</div>
              <div class="ring-pct-text" style="color:${arcColor};">${pct.toFixed(0)}%</div>
            </div>
          </div>
          <div class="goal-info">
            <div class="goal-name">${g.name}</div>
            <div class="goal-progress-text">${currency(g.saved)} z ${currency(g.target)}</div>
            <div class="goal-btns">
              <button onclick="depositGoal(${i})" class="pill pill-blue"  style="font-size:13px;padding:5px 11px;">+ Wpłać</button>
              <button onclick="removeGoal(${i})"  class="pill pill-red"   style="font-size:13px;padding:5px 11px;">Usuń</button>
            </div>
          </div>
        </div>
        ${rem > 0 ? `
        <div class="goal-footer">
          <div class="goal-footer-item">
            <div class="gfi-label">Pozostało</div>
            <div class="gfi-value">${currency(rem)}</div>
          </div>
          <div class="goal-footer-item" style="text-align:right;">
            <div class="gfi-label">Szacowany czas</div>
            <div class="gfi-value">${mLeft} mies.</div>
          </div>
        </div>` : `
        <div style="margin-top:14px;padding-top:14px;border-top:0.33px solid var(--sep-opaque);font-size:15px;font-weight:600;color:var(--green);">🎉 Cel osiągnięty!</div>`}
      </div>`;
    }).join('')}

    <!-- Tips -->
    <div style="padding:16px 16px 8px;"><div class="t-overline">Zasady oszczędzania</div></div>
    <div style="margin:0 16px 8px;">
      <div class="group-card">
        ${tips.map(t => `
        <div class="tip-item">
          <div class="tip-icon-wrap" style="background:${t.tint};">${t.icon}</div>
          <div>
            <div class="tip-title">${t.title}</div>
            <div class="tip-detail">${t.detail}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>

  </div>`;
}

function createGoal() {
  const name = prompt('Nazwa celu (np. Wakacje, Laptop):');
  if (!name) return;
  const target = parseFloat(prompt('Kwota docelowa (PLN):'));
  if (isNaN(target) || target <= 0) return;
  const icons = ['🎯','✈️','💻','🏠','🚗','📱','🎮','🌴','💍','📚','🎸','🏋️'];
  DB.goals.push({ name, target, saved: 0, icon: icons[Math.floor(Math.random() * icons.length)], created: new Date().toISOString() });
  persist(); renderPage();
}

function depositGoal(i) {
  const a = parseFloat(prompt(`Ile wpłacić na "${DB.goals[i].name}"?`));
  if (isNaN(a) || a <= 0) return;
  DB.goals[i].saved = Math.min(DB.goals[i].saved + a, DB.goals[i].target);
  persist(); renderPage(); showToast(`Wpłacono ${currency(a)}`);
}

function removeGoal(i) {
  if (!confirm(`Usunąć cel "${DB.goals[i].name}"?`)) return;
  DB.goals.splice(i, 1); persist(); renderPage();
}

/* ════════════════════════════════════════════════════════════
   AI COACH
   ════════════════════════════════════════════════════════════ */
function buildAI() {
  const suggestions = ['Jak mi idzie?', 'Gdzie tracę?', 'Zrób mi budżet', 'Co ograniczyć?', 'Plan oszczędzania'];
  const msgs = DB.chat.length === 0
    ? `<div class="chat-msg ai"><div class="chat-bubble">Cześć! 👋 Jestem Twoim osobistym coachem finansowym. Widzę Twoje wydatki i pomagam oszczędzać więcej. O co chcesz zapytać?</div></div>`
    : DB.chat.map(m => `<div class="chat-msg ${m.r}"><div class="chat-bubble">${m.t.replace(/\n/g,'<br>')}</div></div>`).join('');

  return `<div class="page-in" id="chat-layout">
    <div style="padding:14px 16px 8px;flex-shrink:0;">
      <div class="t-large-title">Coach AI</div>
      <div style="font-size:14px;color:var(--label-3);margin-top:3px;letter-spacing:-0.1px;">Personalizowane porady finansowe</div>
    </div>
    <div id="chat-messages">
      ${msgs}
      <div id="chat-end"></div>
    </div>
    <div style="flex-shrink:0;background:var(--tabbar-bg);border-top:0.33px solid var(--sep);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
      <div class="chat-suggestion-row">
        ${suggestions.map(s => `<button class="chat-suggestion" onclick="quickSend('${s}')">${s}</button>`).join('')}
      </div>
      <div id="chat-input-bar">
        <input id="chat-input-field" placeholder="Napisz wiadomość…" onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M14.5 8L1.5 2 3.5 8l-2 6 13-6z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </div>`;
}

function initChatLayout() {
  const wrap = document.getElementById('chat-layout');
  if (wrap) {
    wrap.style.height = window.innerHeight + 'px';
    document.getElementById('content').style.paddingBottom = '0';
  }
  document.getElementById('chat-end')?.scrollIntoView();
}

function quickSend(text) {
  const f = document.getElementById('chat-input-field');
  if (f) f.value = text;
  sendMessage();
}

async function sendMessage() {
  const field = document.getElementById('chat-input-field');
  const text = field ? field.value.trim() : '';
  if (!text) return;
  if (field) field.value = '';

  DB.chat.push({ r: 'user', t: text });
  persist();
  appendBubble('user', text);

  // Typing indicator
  const tId = 'typing-' + Date.now();
  const cm = document.getElementById('chat-messages');
  if (cm) {
    cm.insertAdjacentHTML('beforeend', `<div class="chat-msg ai" id="${tId}"><div class="chat-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`);
    document.getElementById('chat-end')?.scrollIntoView({ behavior: 'smooth' });
  }

  // Build context
  const exps  = monthExps(monthKey());
  const total = exps.reduce((s, e) => s + e.amount, 0);
  const bycat = {};
  exps.forEach(e => { bycat[e.category] = (bycat[e.category] || 0) + e.amount; });
  const catStr = Object.entries(bycat).map(([id, a]) => `${catById(id).label}: ${currency(a)}`).join(', ') || 'brak';
  const ctx = `Dochód netto: ${DB.income > 0 ? currency(DB.income) + '/mies.' : 'nieokreślony'}. Wydatki ${new Date().toLocaleDateString('pl-PL', { month: 'long' })}: ${currency(total)}. Oszczędności: ${DB.income > 0 ? currency(DB.income - total) : '?'}. Kategorie: ${catStr}. Cele: ${DB.goals.map(g => `${g.name} (${currency(g.saved)}/${currency(g.target)})`).join(', ') || 'brak'}.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 900,
        system: `Jesteś osobistym coachem finansowym. Użytkownik zarabia dobrze ale nie oszczędza — nie wie gdzie idą pieniądze, wydaje impulsywnie, brakuje planu. Mówisz po polsku. Jesteś bezpośredni, konkretny, używasz liczb. Maksymalnie 3-4 zdania chyba że prosisz o pełny plan. Dane użytkownika: ${ctx}`,
        messages: DB.chat.map(m => ({ role: m.r === 'user' ? 'user' : 'assistant', content: m.t })),
      }),
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'Przepraszam, coś poszło nie tak.';
    document.getElementById(tId)?.remove();
    DB.chat.push({ r: 'ai', t: reply });
    persist();
    appendBubble('ai', reply);
  } catch {
    document.getElementById(tId)?.remove();
    appendBubble('ai', 'Błąd połączenia. Sprawdź internet i spróbuj ponownie.');
  }
}

function appendBubble(role, text) {
  const cm = document.getElementById('chat-messages');
  if (!cm) return;
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = `<div class="chat-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  const end = document.getElementById('chat-end');
  end ? end.before(div) : cm.appendChild(div);
  end?.scrollIntoView({ behavior: 'smooth' });
}

/* ════════════════════════════════════════════════════════════
   ADD EXPENSE SHEET
   ════════════════════════════════════════════════════════════ */
let sheetState = { amount: '', category: 'food' };

function openSheet() {
  sheetState = { amount: '', category: 'food' };
  buildCategoryPills();
  buildNumpad();
  updateAmountDisplay();
  document.getElementById('note-field').value = '';
  document.getElementById('add-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('add-sheet').classList.remove('open');
}

function buildCategoryPills() {
  document.getElementById('cat-scroller').innerHTML = CATS.map(c => `
    <button class="cat-chip ${c.id === sheetState.category ? 'selected' : ''}" onclick="pickCategory('${c.id}', this)">
      <span class="cat-chip-icon">${c.emoji}</span>
      <span class="cat-chip-label">${c.label}</span>
    </button>`).join('');
}

function pickCategory(id, btn) {
  sheetState.category = id;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function buildNumpad() {
  const keys = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];
  document.getElementById('numpad').innerHTML =
    keys.map(k => k === '⌫'
      ? `<button class="num-btn del" onclick="numPress('del')">⌫</button>`
      : `<button class="num-btn" onclick="numPress('${k}')">${k}</button>`
    ).join('') +
    `<button class="num-btn confirm" onclick="submitExpense()">Dodaj wydatek</button>`;
}

function numPress(k) {
  if (k === 'del') {
    sheetState.amount = sheetState.amount.slice(0, -1);
  } else if (k === '.') {
    if (!sheetState.amount.includes('.')) sheetState.amount += sheetState.amount ? '.' : '0.';
  } else {
    if (sheetState.amount.includes('.') && sheetState.amount.split('.')[1].length >= 2) return;
    if (!sheetState.amount && k === '0') return;
    if (sheetState.amount.length >= 8) return;
    sheetState.amount += k;
  }
  updateAmountDisplay();
}

function updateAmountDisplay() {
  const el = document.getElementById('amt-display');
  if (el) el.textContent = sheetState.amount || '0';
}

function submitExpense() {
  const amount = parseFloat(sheetState.amount);
  if (!amount || amount <= 0) { showToast('Wpisz kwotę'); return; }
  const note = document.getElementById('note-field')?.value.trim() || '';
  DB.expenses.push({
    id:       Date.now().toString(36) + Math.random().toString(36).slice(2),
    amount,
    category: sheetState.category,
    note,
    date:     new Date().toISOString(),
    month:    monthKey(),
  });
  persist();
  closeSheet();
  showToast('Dodano ' + currency(amount));
  if (currentTab === 'home' || currentTab === 'stats') renderPage();
}

/* ════════════════════════════════════════════════════════════
   CAMERA / RECEIPT SCAN
   ════════════════════════════════════════════════════════════ */
let cameraStream = null;

async function openScan() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('scan-video').srcObject = cameraStream;
    document.getElementById('scan-overlay').classList.add('open');
  } catch {
    showToast('Brak dostępu do aparatu');
  }
}

function closeScan() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('scan-overlay').classList.remove('open');
}

async function capturePhoto() {
  const video  = document.getElementById('scan-video');
  const canvas = document.getElementById('scan-canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  closeScan();
  showToast('Analizuję paragon…');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: 'Odpowiadaj TYLKO w JSON bez żadnego innego tekstu. Analizujesz zdjęcia paragonów. Zwróć: {"amount":liczba,"category":"food|cafe|transport|fun|shopping|housing|health|sub|sport|travel|invest|other","note":"max 3 słowa"}. Jeśli nie paragon: {"error":"krótki opis"}.',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text',  text: 'Przeanalizuj ten paragon.' }
        ]}],
      }),
    });
    const data = await resp.json();
    let txt = (data.content?.[0]?.text || '{}').replace(/```json|```/g, '').trim();
    const result = JSON.parse(txt);
    if (result.error) { showToast(result.error); return; }
    if (result.amount > 0) {
      sheetState.amount = String(result.amount);
      if (result.category) sheetState.category = result.category;
      if (result.note) { const nf = document.getElementById('note-field'); if (nf) nf.value = result.note; }
      updateAmountDisplay();
      buildCategoryPills();
      showToast('Wykryto: ' + currency(result.amount));
    } else {
      showToast('Nie wykryto kwoty');
    }
  } catch {
    showToast('Błąd analizy');
  }
}

/* ════════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 2600);
}

/* ════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════ */
(function boot() {
  // Safe area detection — PWA standalone vs Safari
  const standalone = window.navigator.standalone === true;
  const sat = standalone ? 'env(safe-area-inset-top, 47px)' : '0px';
  const sab = 'env(safe-area-inset-bottom, 0px)';
  document.documentElement.style.setProperty('--sat', sat);
  document.documentElement.style.setProperty('--sab', sab);
  document.getElementById('status-bar').style.height = sat;

  renderPage();

  if (DB.income === 0 && DB.expenses.length === 0) {
    setTimeout(() => {
      if (confirm('Witaj w aplikacji Budżet! 👋\n\nPodaj swój miesięczny dochód netto (na rękę) żeby zacząć śledzić oszczędności.')) {
        promptIncome();
      }
    }, 700);
  }
})();
</script>
