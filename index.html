<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />

    <!-- SEO / Social -->
    <meta name="description" content="Śledź wydatki, cele oszczędnościowe i stałe płatności. Twój osobisty asystent finansowy." />
    <meta name="application-name" content="Lucent" />
    <meta property="og:title" content="Lucent — Finanse osobiste" />
    <meta property="og:description" content="Śledź wydatki, cele oszczędnościowe i stałe płatności." />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="%BASE_URL%logo.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <title>Lucent</title>

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://accounts.google.com; img-src 'self' data: https: blob:; font-src 'self'; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self';" />

    <script>
      // GitHub Pages SPA fix — przywróć ścieżkę po przekierowaniu z 404.html
      (function() {
        var redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect && redirect.charAt(0) === '/' && redirect.charAt(1) !== '/' && redirect.charAt(1) !== '\\') {
          var repo = '/Lucent';
          window.history.replaceState(null, null, repo + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
